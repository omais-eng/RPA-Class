<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Study Generator</h1>
      <p>Enter a topic or paste your notes — AI will generate your study material instantly.</p>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <textarea id="userInput" placeholder="e.g. 'Photosynthesis' or paste your notes here..."></textarea>

      <div class="output-types">
        <label><input type="checkbox" value="flashcards" checked /> Flashcards</label>
        <label><input type="checkbox" value="quiz" checked /> Multiple Choice Quiz</label>
        <label><input type="checkbox" value="summary" checked /> Summary</label>
        <label><input type="checkbox" value="fill_in_the_blank" checked /> Fill-in-the-blank</label>
      </div>

      <button id="generateBtn" onclick="generate()">Generate Study Material</button>
    </section>

    <!-- Loading -->
    <div id="loader" class="loader hidden">
      <div class="spinner"></div>
      <p>Generating your study material...</p>
    </div>

    <!-- Error -->
    <div id="errorBox" class="error-box hidden"></div>

    <!-- Output Tabs -->
    <section id="outputSection" class="output-section hidden">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('flashcards')">Flashcards</button>
        <button class="tab-btn" onclick="showTab('quiz')">Quiz</button>
        <button class="tab-btn" onclick="showTab('summary')">Summary</button>
        <button class="tab-btn" onclick="showTab('blanks')">Fill-in-the-blank</button>
      </div>

      <!-- Flashcards Tab -->
      <div id="tab-flashcards" class="tab-content active">
        <div class="card-counter" id="cardCounter"></div>
        <div class="flashcard" id="flashcard" onclick="flipCard()">
          <div class="flashcard-inner" id="flashcardInner">
            <div class="flashcard-front" id="cardFront"></div>
            <div class="flashcard-back" id="cardBack"></div>
          </div>
        </div>
        <div class="card-nav">
          <button onclick="prevCard()">← Previous</button>
          <button onclick="nextCard()">Next →</button>
        </div>
        <p class="hint">Click the card to flip it</p>
      </div>

      <!-- Quiz Tab -->
      <div id="tab-quiz" class="tab-content hidden">
        <div id="quizContainer"></div>
        <button id="submitQuizBtn" onclick="submitQuiz()" class="submit-btn">Submit Quiz</button>
        <div id="quizScore" class="score-box hidden"></div>
      </div>

      <!-- Summary Tab -->
      <div id="tab-summary" class="tab-content hidden">
        <ul id="summaryList" class="summary-list"></ul>
      </div>

      <!-- Fill in the blank Tab -->
      <div id="tab-blanks" class="tab-content hidden">
        <div id="blanksContainer"></div>
        <button onclick="checkBlanks()" class="submit-btn">Check Answers</button>
        <div id="blanksScore" class="score-box hidden"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
